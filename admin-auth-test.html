<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Diagnóstico admin-auth</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#f4f4f2;color:#1c1c1b;margin:0;padding:24px}
    main{max-width:620px;margin:auto;background:#fff;border:1px solid #ddd;border-radius:16px;padding:22px}
    label{display:grid;gap:7px;font-weight:700}
    input,button{font:inherit;min-height:46px;border-radius:10px}
    input{border:1px solid #bbb;padding:0 12px}
    button{margin-top:12px;border:0;padding:0 16px;background:#c73520;color:#fff;font-weight:800}
    pre{white-space:pre-wrap;background:#171717;color:#f5f5f5;border-radius:12px;padding:15px;min-height:90px}
    .ok{color:#177245}.bad{color:#b42318}
  </style>
</head>
<body>
<main>
  <h1>Probar acceso del administrador</h1>
  <p>Esta página no guarda el PIN. Solo prueba la función <code>admin-auth</code>.</p>
  <form id="testForm">
    <label>PIN
      <input id="testPin" type="password" inputmode="numeric" autocomplete="off" required>
    </label>
    <button type="submit">Probar admin-auth</button>
  </form>
  <h2>Resultado</h2>
  <pre id="result">Esperando prueba…</pre>
  <p><a href="admin.html">Volver al administrador</a></p>
</main>
<script src="supabase-config.js?v=18-mobile-fixed"></script>
<script>
const result = document.getElementById("result");

function headersFor(key) {
  const headers = {"Content-Type":"application/json","apikey":key};
  if (key.startsWith("eyJ") && key.split(".").length === 3) {
    headers.Authorization = `Bearer ${key}`;
  }
  return headers;
}

document.getElementById("testForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  const cfg = window.FOGON_SUPABASE || {};
  const url = String(cfg.url || "").replace(/\/$/, "");
  const key = String(cfg.anonKey || "").trim();
  const pinInput = document.getElementById("testPin");
  const pin = pinInput.value.trim();
  pinInput.value = "";

  if (!url || !key) {
    result.textContent = "ERROR: faltan url o anonKey en supabase-config.js";
    result.className = "bad";
    return;
  }

  result.textContent = "Conectando…";
  result.className = "";

  try {
    const response = await fetch(`${url}/functions/v1/admin-auth`, {
      method: "POST",
      mode: "cors",
      cache: "no-store",
      headers: headersFor(key),
      body: JSON.stringify({adminPin: pin})
    });

    const text = await response.text();
    result.textContent = `HTTP ${response.status}\n${text || "(respuesta vacía)"}`;
    result.className = response.ok ? "ok" : "bad";
  } catch (error) {
    result.textContent = `ERROR DE RED\n${error?.message || error}`;
    result.className = "bad";
  }
});
</script>
</body>
</html>
