<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Diagnóstico de pedidos | El Fogón D' Geny</title>
  <style>
    :root { font-family: Arial, sans-serif; color: #1d1d1f; background: #f4f4f4; }
    body { margin: 0; padding: 18px; }
    main { max-width: 880px; margin: 0 auto; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    h2 { margin: 0 0 10px; font-size: 1.1rem; }
    p { line-height: 1.45; }
    button { min-height: 46px; border: 0; border-radius: 10px; padding: 0 15px; margin: 4px 6px 4px 0; font-weight: 700; cursor: pointer; }
    .primary { background: #d83a21; color: #fff; }
    .secondary { background: #222; color: #fff; }
    .danger { background: #8c1d18; color: #fff; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; }
    .test { border-left: 6px solid #999; padding: 10px 12px; margin: 8px 0; background: #fafafa; border-radius: 8px; }
    .ok { border-left-color: #16803d; }
    .bad { border-left-color: #c62828; }
    .warn { border-left-color: #e38b00; }
    .label { font-weight: 800; }
    pre { white-space: pre-wrap; word-break: break-word; background: #111; color: #f5f5f5; padding: 12px; border-radius: 10px; max-height: 360px; overflow: auto; }
    code { word-break: break-all; }
    small { color: #666; }
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>Diagnóstico de pedidos</h1>
    <p>Esta página no cambia el menú ni el admin. Comprueba la publicación, la conexión con Supabase, la lectura de pedidos y permite crear un pedido de prueba.</p>
    <p><strong>Dirección actual:</strong> <code id="currentUrl"></code><br><strong>Hora:</strong> <span id="currentTime"></span></p>
    <div class="row">
      <button id="runBtn" class="primary" type="button">Ejecutar diagnóstico</button>
      <button id="testOrderBtn" class="secondary" type="button">Crear pedido de prueba</button>
      <button id="copyBtn" type="button">Copiar informe</button>
    </div>
  </section>

  <section class="card">
    <h2>Resultados</h2>
    <div id="results"></div>
  </section>

  <section class="card">
    <h2>Últimos pedidos que ve Supabase</h2>
    <pre id="ordersOutput">Todavía no comprobado.</pre>
  </section>

  <section class="card">
    <h2>Informe técnico</h2>
    <pre id="logOutput"></pre>
  </section>
</main>

<script src="supabase-config.js?v=diagnostico-20260718"></script>
<script>
(function () {
  "use strict";

  var results = document.getElementById("results");
  var logOutput = document.getElementById("logOutput");
  var ordersOutput = document.getElementById("ordersOutput");
  var lastDiagnosticOrderId = null;
  var reportLines = [];

  document.getElementById("currentUrl").textContent = location.href;
  document.getElementById("currentTime").textContent = new Date().toLocaleString();

  function stringify(value) {
    try { return JSON.stringify(value, null, 2); }
    catch (_) { return String(value); }
  }

  function log(title, value) {
    var line = "[" + new Date().toISOString() + "] " + title + "\n" + stringify(value);
    reportLines.push(line);
    logOutput.textContent = reportLines.join("\n\n");
  }

  function result(name, state, detail) {
    var div = document.createElement("div");
    div.className = "test " + state;
    var strong = document.createElement("div");
    strong.className = "label";
    strong.textContent = name + ": " + (state === "ok" ? "CORRECTO" : state === "warn" ? "ADVERTENCIA" : "ERROR");
    var body = document.createElement("div");
    body.textContent = detail || "";
    div.appendChild(strong);
    div.appendChild(body);
    results.appendChild(div);
  }

  function headers(cfg, extra) {
    var h = {
      "apikey": cfg.anonKey,
      "Authorization": "Bearer " + cfg.anonKey,
      "Content-Type": "application/json"
    };
    if (extra) {
      Object.keys(extra).forEach(function (key) { h[key] = extra[key]; });
    }
    return h;
  }

  function parseResponse(response) {
    return response.text().then(function (text) {
      var data = text;
      try { data = text ? JSON.parse(text) : null; } catch (_) {}
      if (!response.ok) {
        var error = new Error("HTTP " + response.status + " " + response.statusText);
        error.response = data;
        error.status = response.status;
        throw error;
      }
      return data;
    });
  }

  function fetchNoCache(path) {
    var separator = path.indexOf("?") === -1 ? "?" : "&";
    return fetch(path + separator + "diag=" + Date.now(), { cache: "no-store" });
  }

  function checkPublishedFile(path) {
    return fetchNoCache(path).then(function (response) {
      if (!response.ok) throw new Error(path + " devolvió HTTP " + response.status);
      return response.text();
    }).then(function (text) {
      result("Archivo publicado " + path, "ok", text.length + " caracteres recibidos");
      return text;
    }).catch(function (error) {
      result("Archivo publicado " + path, "bad", error.message);
      log("Fallo al cargar " + path, error.message);
      return "";
    });
  }

  function getConfig() {
    var cfg = window.FOGON_SUPABASE || {};
    if (!cfg.url || !cfg.anonKey) {
      result("Configuración de Supabase", "bad", "No existe window.FOGON_SUPABASE o faltan URL/anonKey.");
      throw new Error("Configuración de Supabase ausente");
    }
    result("Configuración de Supabase", "ok", cfg.url);
    return cfg;
  }

  function readOrders(cfg) {
    var table = cfg.tables && cfg.tables.orders ? cfg.tables.orders : "orders";
    var url = cfg.url + "/rest/v1/" + encodeURIComponent(table) + "?select=*&order=created_at.desc&limit=5";
    return fetch(url, { method: "GET", headers: headers(cfg), cache: "no-store" })
      .then(parseResponse)
      .then(function (rows) {
        result("Lectura de pedidos", "ok", "Supabase devolvió " + (rows ? rows.length : 0) + " pedido(s).");
        ordersOutput.textContent = stringify(rows || []);
        log("Lectura de pedidos", rows || []);
        return rows || [];
      })
      .catch(function (error) {
        result("Lectura de pedidos", "bad", error.message + " — " + stringify(error.response || ""));
        ordersOutput.textContent = stringify(error.response || error.message);
        log("Error leyendo pedidos", { message: error.message, response: error.response });
        throw error;
      });
  }

  function checkRpc(cfg) {
    var fn = cfg.functions && cfg.functions.nextOrderId ? cfg.functions.nextOrderId : "next_order_public_id";
    var url = cfg.url + "/rest/v1/rpc/" + encodeURIComponent(fn);
    return fetch(url, { method: "POST", headers: headers(cfg), body: "{}", cache: "no-store" })
      .then(parseResponse)
      .then(function (value) {
        result("Función de número de pedido", "ok", "Respondió con: " + stringify(value));
        log("RPC " + fn, value);
        return Number(value);
      })
      .catch(function (error) {
        result("Función de número de pedido", "bad", error.message + " — " + stringify(error.response || ""));
        log("Error RPC", { message: error.message, response: error.response });
        throw error;
      });
  }

  function createTestOrder() {
    results.innerHTML = "";
    reportLines = [];
    logOutput.textContent = "";
    var cfg;
    try { cfg = getConfig(); } catch (error) { return; }

    checkRpc(cfg).then(function (publicId) {
      if (!isFinite(publicId) || publicId < 1) throw new Error("El RPC no devolvió un ID numérico válido: " + publicId);
      var table = cfg.tables && cfg.tables.orders ? cfg.tables.orders : "orders";
      var payload = {
        public_id: publicId,
        customer_name: "DIAGNÓSTICO - ELIMINAR",
        customer_phone: "0000000000",
        language: "es",
        payment_method: "cash",
        status: "new",
        subtotal: 1,
        tax: 0,
        total: 1,
        items: [{ id: "diagnostico", name: "Pedido de prueba", quantity: 1, unitPrice: 1, total: 1, orderType: "takeout" }]
      };
      var url = cfg.url + "/rest/v1/" + encodeURIComponent(table) + "?select=*";
      return fetch(url, {
        method: "POST",
        headers: headers(cfg, { "Prefer": "return=representation" }),
        body: JSON.stringify(payload),
        cache: "no-store"
      }).then(parseResponse);
    }).then(function (rows) {
      var row = rows && rows[0] ? rows[0] : rows;
      lastDiagnosticOrderId = row && row.id ? row.id : null;
      result("Inserción de pedido", "ok", "El pedido de prueba fue guardado en Supabase. Debe aparecer en el admin.");
      log("Pedido insertado", rows);
      return readOrders(cfg);
    }).catch(function (error) {
      result("Inserción de pedido", "bad", error.message + " — " + stringify(error.response || ""));
      log("Error insertando pedido", { message: error.message, response: error.response, status: error.status });
    });
  }

  function runDiagnostic() {
    results.innerHTML = "";
    reportLines = [];
    logOutput.textContent = "";
    ordersOutput.textContent = "Comprobando...";

    if (!window.fetch) {
      result("Navegador", "bad", "Este navegador no dispone de fetch. Ejecuta el diagnóstico desde un móvil o computadora reciente.");
      return;
    }

    result("Navegador", "ok", navigator.userAgent);

    Promise.all([
      checkPublishedFile("index.html"),
      checkPublishedFile("admin.html"),
      checkPublishedFile("app.js"),
      checkPublishedFile("admin.js"),
      checkPublishedFile("supabase-client.js"),
      checkPublishedFile("supabase-config.js")
    ]).then(function (texts) {
      var indexText = texts[0] || "";
      var adminText = texts[1] || "";
      var appText = texts[2] || "";
      var supabaseClientText = texts[4] || "";

      result("Versión de app.js en index.html", indexText.indexOf("app.js?v=30-order-fix") !== -1 ? "ok" : "warn",
        indexText.indexOf("app.js?v=30-order-fix") !== -1 ? "Se encontró v=30-order-fix." : "No se encontró v=30-order-fix; puede haberse subido otro index.html.");
      result("Versión de supabase-client.js en admin.html", adminText.indexOf("supabase-client.js?v=30-order-fix") !== -1 ? "ok" : "warn",
        adminText.indexOf("supabase-client.js?v=30-order-fix") !== -1 ? "Se encontró v=30-order-fix." : "El admin parece cargar otra versión.");
      result("Control de error de envío", appText.indexOf("No se pudo enviar el pedido") !== -1 ? "ok" : "warn",
        appText.indexOf("No se pudo enviar el pedido") !== -1 ? "La versión publicada contiene el aviso de error." : "La versión publicada no parece ser la corregida.");
      result("Código de tipo de pedido", supabaseClientText.indexOf("orderType") !== -1 ? "ok" : "warn",
        supabaseClientText.indexOf("orderType") !== -1 ? "La versión publicada contiene orderType." : "No aparece orderType en supabase-client.js.");

      var cfg;
      try { cfg = getConfig(); } catch (error) { return; }
      readOrders(cfg).catch(function () {});
    });
  }

  document.getElementById("runBtn").onclick = runDiagnostic;
  document.getElementById("testOrderBtn").onclick = createTestOrder;
  document.getElementById("copyBtn").onclick = function () {
    var text = "DIAGNÓSTICO EL FOGÓN\n" + new Date().toISOString() + "\n" + location.href + "\n\n" + reportLines.join("\n\n");
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { alert("Informe copiado."); });
    } else {
      window.prompt("Copia este informe:", text);
    }
  };

  runDiagnostic();
})();
</script>
</body>
</html>
