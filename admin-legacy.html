<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Panel iPad antiguo | El Fogon D' Geny</title>
  <style>
    html,body{margin:0;padding:0;background:#111;color:#fff;font-family:Arial,sans-serif;-webkit-text-size-adjust:100%}
    *{-webkit-box-sizing:border-box;box-sizing:border-box}button,input{font:inherit}
    .wrap{max-width:960px;margin:0 auto;padding:16px}.card{background:#1d1d1d;border:1px solid #444;border-radius:12px;padding:16px;margin-bottom:14px}
    h1,h2,p{margin-top:0}.muted{color:#bbb}.row{overflow:hidden}.left{float:left}.right{float:right}.clear{clear:both}
    input{width:100%;padding:14px;border:1px solid #666;border-radius:8px;background:#fff;color:#111;margin:8px 0 12px}
    button{border:0;border-radius:8px;padding:13px 15px;margin:4px;background:#d83a21;color:#fff;font-weight:bold}.secondary{background:#444}.danger{background:#8f1d1d}.full{width:100%;margin:5px 0}
    .tabs button{background:#333}.tabs button.active{background:#d83a21}.panel{display:none}.panel.active{display:block}
    .order{background:#252525;border:1px solid #555;border-left:6px solid #d83a21;border-radius:10px;padding:14px;margin:12px 0}.order.accepted{border-left-color:#e9a72f}.order.ready{border-left-color:#2c9f57}
    .item{border-top:1px solid #444;padding-top:9px;margin-top:9px}.status{font-weight:bold}.error{background:#6d1818;padding:10px;border-radius:8px}.ok{background:#174f2b;padding:10px;border-radius:8px}
    .availability{display:block;padding:12px 0;border-bottom:1px solid #444}.availability input{width:auto;margin-right:10px}
    @media(max-width:600px){.left,.right{float:none}.right{margin-top:8px}.wrap{padding:10px}button{min-height:46px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="login" class="card">
      <h1>Panel iPad antiguo</h1>
      <p class="muted">El Fogon D' Geny</p>
      <form id="pinForm">
        <label>PIN</label>
        <input id="pinInput" type="password" inputmode="numeric" autocomplete="off">
        <button class="full" type="submit">Entrar</button>
        <p id="pinError" class="error" style="display:none">PIN incorrecto.</p>
      </form>
    </div>

    <div id="admin" style="display:none">
      <div class="card row">
        <div class="left"><h1>Pedidos</h1><p class="muted">Versión compatible con iPad antiguo</p></div>
        <div class="right"><button id="refreshBtn" class="secondary">Actualizar</button></div><div class="clear"></div>
        <p id="connectionMessage" class="muted">Conectando…</p>
      </div>
      <div class="tabs card">
        <button class="active" data-tab="orders">Pedidos</button>
        <button data-tab="kitchen">Cocina</button>
        <button data-tab="availability">Disponibilidad</button>
      </div>
      <div id="ordersPanel" class="panel active"><div id="ordersList"></div></div>
      <div id="kitchenPanel" class="panel"><div id="kitchenList"></div></div>
      <div id="availabilityPanel" class="panel"><div class="card"><h2>Disponibilidad</h2><p class="muted">Activa o desactiva productos completos.</p><div id="availabilityList"></div></div></div>
    </div>
  </div>
  <script src="admin-legacy.js?v=1"></script>
</body>
</html>
